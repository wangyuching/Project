<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Search Page</title>
        <style>
        body {
            background-color: rgb(20, 29, 37);
            margin: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }              
        
        .pageChange {
            position: absolute;
            top: 0;
            left: 0;
            width:fit-content;
            height:fit-content;
            padding: 5px 0px 2px 0px;
            display: flex;
            flex-direction: column;
        }
        a {
            color: rgb(213, 219, 255);
            text-decoration: none;
            padding: 10px;
            writing-mode: vertical-rl;
            text-orientation: upright;
        }
        a:hover {
            background-color: rgb(50, 58, 66);
        }
    </style>
</head>

<body>
    <img style="width: 0; height: 0;" src="{{ url_for('cap_in_html') }}" alt="Video Stream">
    <div class="pageChange"><a href="{{ url_for('home') }}">記錄中</a><a href="#">搜尋記錄</a></div>

    <table>
        <thead>
            <tr>
                <th style="color: rgb(213, 219, 255); padding: 10px; border: 1px solid rgb(213, 219, 255);">Time</th>
                <th style="color: rgb(213, 219, 255); padding: 10px; border: 1px solid rgb(213, 219, 255);">State</th>
                <th style="color: rgb(213, 219, 255); padding: 10px; border: 1px solid rgb(213, 219, 255);">Auto Finish
                </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="color: rgb(213, 219, 255); padding: 10px; border: 1px solid rgb(213, 219, 255);">time</td>
                <td style="color: rgb(213, 219, 255); padding: 10px; border: 1px solid rgb(213, 219, 255);">state</td>
                <td style="color: rgb(213, 219, 255); padding: 10px; border: 1px solid rgb(213, 219, 255);">auto_finish</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
