<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Count eat Medicine</title>
    <style>
        body {
            background-color: rgb(20, 29, 37);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
            border-radius: 10px;
        }

        .time {
            width: 30%;
            height: 80%;
            background-color: rgb(8, 18, 26);
            color: rgb(22, 239, 18);
            font-size: 18px;
            padding: 20px;
            overflow-y: hidden;
            white-space: pre-line;
        }

        img {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>

<body>
    <div class="time-container" style="width: 30%; display: flex; flex-direction: column; height: 90%;">
        <div class="time" id="log-content" style="width: 100%; flex-grow: 1;">載入中...請稍候...</div>
    </div>
    <img src="{{ url_for('cap_in_html') }}" alt="Video Stream">
</body>

</html>

<script>
    function refreshTable() {
        // 發送請求到我們剛寫好的 API
        fetch('/api/history')
            .then(response => response.json())
            .then(data => {
                const logContent = document.getElementById("log-content");
                
                // 如果沒有資料，顯示提示
                if (data.length === 0) {
                    logContent.innerHTML = '目前沒有記錄。';
                    return;
                }

                // 重新建構表格內容
                let htmlContent = "";
                data.forEach(row => {
                    htmlContent += `
                        <p style="line-height: 1;">${row.state} at: ${row.time}
                        <br>${row.auto_finish ? ' (' + row.auto_finish + ')' : ''}</p>
                    `;
                });
                
                // 將產生的 HTML 塞回 logContent
                logContent.innerHTML = htmlContent;
                logContent.scrollTop = logContent.scrollHeight; // 自動滾動到底部
            })
            .catch(error => console.error('Error fetching data:', error));
    }

    // 設定定時器：每 1 秒 (1000 毫秒) 執行一次 refreshTable
    setInterval(refreshTable, 1000);

    // 頁面載入完成後先執行一次
    window.onload = refreshTable;
</script>
